<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>MusicZ 专属播放器 12.0</title>
    <style>
        /* ====== 桌面端原生沉浸式布局 ====== */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f6f8; 
            margin: 0;
            overflow: hidden; 
        }
        
        .player-container {
            width: 100vw;
            height: 100vh;
            box-sizing: border-box; 
            background-color: transparent; 
            border-radius: 0; 
            box-shadow: none;
            padding: 25px 30px;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        .main-content {
            display: flex;
            gap: 30px;
            flex: 1;
            overflow: hidden;
        }

        .left-panel {
            width: 260px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .cover-img {
            width: 180px;
            height: 180px;
            border-radius: 15px;
            object-fit: cover;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            margin-bottom: 10px;
        }
        .current-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            text-align: center;
        }
        .current-artist {
            font-size: 14px;
            color: #777;
            margin-bottom: 15px;
        }
        .mode-btn {
            padding: 6px 15px;
            border-radius: 15px;
            border: 1px solid #ccc;
            background-color: transparent;
            color: #555;
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .mode-btn:hover { background-color: #e9eaec; }

        .lyric-box {
            flex: 1;
            width: 100%;
            overflow: hidden;
            position: relative;
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 20%, black 80%, transparent 100%);
        }
        .lyric-list {
            list-style: none;
            padding: 0;
            margin: 0;
            transition: transform 0.4s ease-out;
        }
        .lyric-list li {
            text-align: center;
            color: #888;
            font-size: 14px;
            line-height: 1.6;
            padding: 8px 10px;
            transition: 0.3s;
            word-break: break-word;
        }
        .lyric-list li.active {
            color: #ec4141;
            font-size: 16px;
            font-weight: bold;
        }

        .right-panel {
            background-color: #ffffff;
            border-radius: 16px;
            padding: 20px 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .search-input-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
        }
        .search-input-wrapper input {
            width: 100%;
            padding: 12px;
            padding-right: 35px;
            border: 1px solid #ddd;
            border-radius: 10px;
            outline: none;
            background-color: #f9f9f9;
            transition: 0.2s;
        }
        .search-input-wrapper input:focus {
            background-color: #fff;
            border-color: #ec4141;
            box-shadow: 0 0 0 2px rgba(236,65,65,0.1);
        }
        #clearSearch {
            position: absolute;
            right: 10px;
            cursor: pointer;
            color: #ccc;
            display: none;
            font-size: 20px;
            line-height: 1;
            user-select: none;
        }
        #clearSearch:hover { color: #ec4141; }

        .search-box button {
            padding: 0 25px;
            background-color: #ec4141;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .search-box button:hover { background-color: #d73a3a; }

        .tab-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 5px;
        }
        .tab-btn {
            background: none;
            border: none;
            font-size: 15px;
            color: #666;
            cursor: pointer;
            padding: 5px 10px;
            position: relative;
            transition: 0.2s;
        }
        .tab-btn:hover { color: #333; }
        .tab-btn.active {
            color: #ec4141;
            font-weight: bold;
        }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -7px;
            left: 10%;
            width: 80%;
            height: 3px;
            background-color: #ec4141;
            border-radius: 3px;
        }

        .list-header {
            font-size: 13px;
            color: #888;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .back-btn {
            display: none;
            background: none;
            border: 1px solid #ccc;
            border-radius: 5px;
            cursor: pointer;
            padding: 2px 8px;
            color: #555;
            font-size: 12px;
        }
        .back-btn:hover { background: #eee; }

        .data-list {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
            flex: 1;
            scrollbar-width: thin;
            scrollbar-color: #ddd transparent;
        }
        .data-list::-webkit-scrollbar { width: 6px; }
        .data-list::-webkit-scrollbar-thumb { background-color: #ddd; border-radius: 3px; }
        .data-list li {
            padding: 10px;
            border-bottom: 1px solid #f6f6f6;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            border-radius: 8px;
            transition: background-color 0.1s;
        }
        .data-list li:hover { background-color: #fcebeb; }
        .data-list li.playing-now { background-color: #ec4141; color: white; border-bottom-color: transparent;}
        .data-list li.loading-more { justify-content: center; color: #888; pointer-events: none; border-bottom: none; }
        .data-list li.no-more { justify-content: center; color: #ccc; font-size: 12px; pointer-events: none; border-bottom: none; }
        
        .item-cover {
            width: 40px;
            height: 40px;
            border-radius: 5px;
            object-fit: cover;
        }
        .item-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .item-name { 
            font-size: 14px; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            display: flex; 
            align-items: center;
        }
        
        .vip-tag {
            font-size: 10px;
            color: #ec4141;
            border: 1px solid #ec4141;
            border-radius: 3px;
            padding: 0 3px;
            margin-left: 6px;
            transform: scale(0.9);
            line-height: 1.2;
        }
        .playing-now .vip-tag { color: white; border-color: white; }
        .item-sub { font-size: 12px; color: #888; margin-top: 3px; }
        .playing-now .item-sub { color: rgba(255,255,255,0.8); }

        .bottom-controls {
            display: flex;
            align-items: center;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #ffffff; 
            border-radius: 18px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            height: 60px;
            box-sizing: border-box;
        }
        
        .audio-player { display: none; }

        .playback-btns { display: flex; align-items: center; gap: 18px; margin-right: 25px; }
        
        .ctrl-btn {
            background: none; border: none; color: #444; cursor: pointer; transition: all 0.2s ease;
            display: flex; align-items: center; justify-content: center; user-select: none;
            width: 38px; height: 38px; border-radius: 50%; padding: 0;
        }
        .ctrl-btn:hover { color: #ec4141; background-color: #f9f9f9; transform: scale(1.05); }
        .ctrl-btn:active { transform: scale(0.95); }
        
        .play-pause-btn {
            color: white; background-color: #ec4141; box-shadow: 0 4px 15px rgba(236, 65, 65, 0.4);
            width: 48px; height: 48px;
        }
        .play-pause-btn svg { transform: translateX(-1.5px); transition: transform 0.2s ease; }
        .play-pause-btn.is-paused svg { transform: translateX(0); }
        .play-pause-btn:hover {
            color: white; background-color: #d73a3a; transform: scale(1.08); box-shadow: 0 6px 20px rgba(236, 65, 65, 0.5);
        }

        .progress-container { flex: 1; display: flex; align-items: center; gap: 15px; margin-right: 25px; }
        .time-text { font-size: 12px; color: #888; font-family: monospace; width: 40px; text-align: center; letter-spacing: 0.5px; }
        .progress-bar-wrapper { flex: 1; display: flex; align-items: center; height: 20px; }
        input[type=range] {
            -webkit-appearance: none; width: 100%; height: 4px; 
            background: linear-gradient(to right, #ec4141 var(--progress, 0%), #e0e0e0 var(--progress, 0%));
            border-radius: 2px; cursor: pointer; outline: none;
        }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: transparent; border-radius: 2px; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 12px; width: 12px; border-radius: 50%; background: #ec4141;
            margin-top: -4px; box-shadow: 0 1px 5px rgba(0,0,0,0.3); transition: transform 0.2s;
        }
        input[type=range]:hover::-webkit-slider-thumb { transform: scale(1.3); }
        
        .playlist-toggle-btn {
            background: #f9f9f9; border: 1px solid #eee; border-radius: 20px; padding: 0 16px; height: 34px;
            cursor: pointer; color: #555; display: flex; align-items: center; justify-content: center; gap: 6px; 
            transition: 0.2s; user-select: none; box-sizing: border-box;
        }
        .playlist-toggle-btn:hover { background: #fcebeb; color: #ec4141; border-color: rgba(236,65,65,0.2); }
        #playlistCountBadge { font-size: 14px; font-weight: 600; line-height: 1; transform: translateY(1px); }

        .playlist-panel {
            position: absolute; bottom: 95px; right: 25px; width: 340px; height: 400px;
            background-color: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: none; flex-direction: column;
            z-index: 100; overflow: hidden; border: 1px solid rgba(255,255,255,0.6); opacity: 0;
            transform: translateY(15px); transition: opacity 0.3s, transform 0.3s;
        }
        .playlist-panel.show { display: flex; opacity: 1; transform: translateY(0); }
        .playlist-panel-header { padding: 15px; border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; font-size: 14px; color: #333; font-weight: bold; }
        .playlist-panel-header button { background: none; border: none; color: #888; cursor: pointer; font-size: 13px; font-weight: normal; transition: 0.2s; }
        .playlist-panel-header button:hover { color: #ec4141; }
        .playlist-panel-list { list-style: none; padding: 0; margin: 0; overflow-y: auto; flex: 1; scrollbar-width: thin; scrollbar-color: #ddd transparent; }
        .playlist-panel-list::-webkit-scrollbar { width: 4px; }
        .playlist-panel-list::-webkit-scrollbar-thumb { background-color: #ddd; border-radius: 2px; }
        .playlist-panel-list li { padding: 10px 15px; border-bottom: 1px solid rgba(0,0,0,0.03); cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 13px; transition: 0.1s;}
        .playlist-panel-list li:hover { background-color: rgba(236, 65, 65, 0.04); }
        .playlist-panel-list li.active { color: #ec4141; font-weight: bold; background-color: rgba(236, 65, 65, 0.05); }
        .panel-song-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-right: 10px; color: #333; display: flex; align-items: center; gap: 5px; }
        .playlist-panel-list li.active .panel-song-name { color: #ec4141; }
        .panel-song-artist { color: #999; font-size: 12px; width: 90px; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .playlist-panel-list li.active .panel-song-artist { color: #ec4141; opacity: 0.8;}

        .blind-box-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; color: #555; animation: fadeIn 0.5s ease; }
        .blind-box-icon { font-size: 70px; margin-bottom: 15px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1)); }
        .blind-box-title { font-size: 22px; font-weight: bold; color: #333; margin-bottom: 10px; }
        .blind-box-desc { font-size: 14px; color: #888; margin-bottom: 40px; line-height: 1.6; }
        .blind-box-btn {
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%); color: white; border: none;
            padding: 15px 40px; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 8px 20px rgba(255, 117, 140, 0.4); transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .blind-box-btn:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 12px 25px rgba(255, 117, 140, 0.6); }
        
        .empty-search-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; animation: fadeIn 0.4s ease; }
        .empty-search-icon { color: #d0d0d0; margin-bottom: 20px; }
        .empty-search-title { font-size: 18px; font-weight: bold; color: #444; margin-bottom: 8px; }
        .empty-search-desc { font-size: 13px; color: #999; line-height: 1.6; }

        @keyframes pulse-icon { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; filter: drop-shadow(0 0 15px #ff7eb3); } 100% { transform: scale(1); opacity: 0.8; } }
        .icon-playing { animation: pulse-icon 2s infinite; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .custom-alert-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255, 255, 255, 0.1); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center; z-index: 9999;
            opacity: 0; transition: opacity 0.3s ease; border-radius: 0; 
        }
        .custom-alert-overlay.show { display: flex; opacity: 1; }
        .custom-alert-box {
            background-color: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.6); border-radius: 20px; padding: 30px 40px; text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1); max-width: 320px; transform: translateY(20px) scale(0.95);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .custom-alert-overlay.show .custom-alert-box { transform: translateY(0) scale(1); }
        .custom-alert-icon { font-size: 45px; margin-bottom: 15px; }
        .custom-alert-message { font-size: 15px; color: #444; margin-bottom: 25px; line-height: 1.6; font-weight: bold; }
        .custom-alert-btn { background: #ec4141; color: white; border: none; padding: 10px 35px; border-radius: 20px; font-size: 14px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(236, 65, 65, 0.3); transition: 0.2s; }
        .custom-alert-btn:hover { transform: scale(1.05); background: #d73a3a; box-shadow: 0 6px 20px rgba(236, 65, 65, 0.4); }

    </style>
</head>
<body>

    <div class="player-container" id="playerContainer">
        <div id="customAlert" class="custom-alert-overlay">
            <div class="custom-alert-box">
                <div class="custom-alert-icon">✨</div>
                <div id="customAlertMessage" class="custom-alert-message">提示内容</div>
                <button id="customAlertBtn" class="custom-alert-btn">我知道了</button>
            </div>
        </div>

        <div class="main-content">
            <div class="left-panel">
                <img id="albumCover" src="https://s1.music.126.net/style/web2/img/default/default_album.jpg" class="cover-img">
                <div id="currentSongName" class="current-title">MusicZ</div>
                <div id="currentArtist" class="current-artist">听你想听</div>
                <button id="modeBtn" class="mode-btn">🔁 列表循环</button>
                <div class="lyric-box">
                    <ul class="lyric-list" id="lyricList"><li>欢迎使用MusicZ</li></ul>
                </div>
            </div>

            <div class="right-panel">
                <div class="search-box">
                    <div class="search-input-wrapper">
                        <input type="text" id="searchInput" placeholder="搜索歌曲、歌手、专辑...">
                        <span id="clearSearch" style="padding:4px; display:flex;">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </span>
                    </div>
                    <button id="searchBtn">搜索</button>
                </div>
                
                <div class="tab-bar">
                    <button class="tab-btn active" id="tabNew">🎵 推荐新歌</button>
                    <button class="tab-btn" id="tabPlaylist">💽 热门歌单</button>
                    <button class="tab-btn" id="tabBlindBox">🎲 音乐盲盒</button>
                    <button class="tab-btn" id="tabSearch">🔍 探索广场</button>
                </div>

                <div class="list-header">
                    <span id="listTitle">今日最热新歌</span>
                    <button class="back-btn" id="backBtn">🔙 返回歌单</button>
                </div>

                <ul class="data-list" id="dataList"></ul>
            </div>
        </div>
        
        <div class="bottom-controls">
            <audio class="audio-player" id="audioPlayer" autoplay></audio>
            
            <div class="playback-btns">
                <button id="prevBtn" class="ctrl-btn" title="上一首">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                </button>
                <button id="playPauseBtn" class="ctrl-btn play-pause-btn" title="播放/暂停">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5.14v13.72a1 1 0 001.5.86l11.43-6.86a1 1 0 000-1.72L9.5 4.28a1 1 0 00-1.5.86z"/></svg>
                </button>
                <button id="nextBtn" class="ctrl-btn" title="下一首">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                </button>
            </div>
            
            <div class="progress-container">
                <span class="time-text" id="currentTimeText">00:00</span>
                <div class="progress-bar-wrapper">
                    <input type="range" id="progressBar" min="0" value="0" step="0.1">
                </div>
                <span class="time-text" id="durationText">00:00</span>
            </div>
            
            <button id="playlistToggleBtn" class="playlist-toggle-btn" title="当前播放列表">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h18c0.55 0 1-0.45 1-1s-0.45-1-1-1H3c-0.55 0-1 0.45-1 1S2.45 13 3 13zm0 7h18c0.55 0 1-0.45 1-1s-0.45-1-1-1H3c-0.55 0-1 0.45-1 1S2.45 20 3 20zM3 6c0 0.55 0.45 1 1 1h18c0.55 0 1-0.45 1-1s-0.45-1-1-1H3C2.45 5 2 5.45 2 6z"/></svg>
                <span id="playlistCountBadge">0</span>
            </button>
        </div>

        <div id="playlistPanel" class="playlist-panel">
            <div class="playlist-panel-header">
                <span>当前播放 (<span id="panelHeaderCount">0</span>)</span>
                <button id="clearPlaylistBtn">🗑️ 清空</button>
            </div>
            <ul class="playlist-panel-list" id="playlistPanelList">
                <li style="justify-content:center;color:#888;">队列为空</li>
            </ul>
        </div>
    </div>

    <script>
        // 【核心修改】：固定 127.0.0.1 保证 Windows 系统下请求不报错
        const API_BASE_URL = 'http://127.0.0.1:3000';
        
        const ICON_PLAY_LARGE = '<svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5.14v13.72a1 1 0 001.5.86l11.43-6.86a1 1 0 000-1.72L9.5 4.28a1 1 0 00-1.5.86z"/></svg>';
        const ICON_PAUSE_LARGE = '<svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>';
        const ICON_PLAY_SMALL = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
        const ICON_PAUSE_SMALL = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';

        let displayList = []; 
        let playingList = []; 
        let currentPlayingIndex = -1;
        let parsedLyrics = [];

        let currentView = 'tabNew'; 
        let currentPlaylistId = null; 
        let isFetching = false;       
        let lastSearchKeyword = '';
        
        let isBlindBoxMode = false;
        let blindBoxSourcePool = [];

        const viewDataCache = { tabNew: [], tabPlaylist: [], tabSearch: [], playlistDetail: [] };
        const pagination = { 
            tabNew: { offset: 0, hasMore: true }, 
            tabPlaylist: { offset: 0, hasMore: true }, 
            tabSearch: { offset: 0, hasMore: true }, 
            playlistDetail: { offset: 0, hasMore: true }
        };

        const dataList = document.getElementById('dataList');
        const listTitle = document.getElementById('listTitle');
        const backBtn = document.getElementById('backBtn');
        const tabBtns = document.querySelectorAll('.tab-btn');
        const audioPlayer = document.getElementById('audioPlayer');
        const searchInput = document.getElementById('searchInput');
        const clearSearch = document.getElementById('clearSearch');

        const playlistToggleBtn = document.getElementById('playlistToggleBtn');
        const playlistPanel = document.getElementById('playlistPanel');
        const playlistCountBadge = document.getElementById('playlistCountBadge');
        const panelHeaderCount = document.getElementById('panelHeaderCount');
        const playlistPanelList = document.getElementById('playlistPanelList');
        const clearPlaylistBtn = document.getElementById('clearPlaylistBtn');

        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const progressBar = document.getElementById('progressBar');
        const currentTimeText = document.getElementById('currentTimeText');
        const durationText = document.getElementById('durationText');

        function showCustomAlert(message) {
            document.getElementById('customAlertMessage').innerText = message;
            const alertOverlay = document.getElementById('customAlert');
            alertOverlay.style.display = 'flex';
            alertOverlay.offsetHeight; 
            alertOverlay.classList.add('show');
        }

        function hideCustomAlert() {
            const alertOverlay = document.getElementById('customAlert');
            alertOverlay.classList.remove('show');
            setTimeout(() => {
                if(!alertOverlay.classList.contains('show')) alertOverlay.style.display = 'none';
            }, 300);
        }
        document.getElementById('customAlertBtn').onclick = hideCustomAlert;

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function formatSongs(rawList, source) {
            return rawList.map(item => {
                let song = { id: item.id, name: item.name, type: 'song' };
                if (source === 'cloudsearch' || source === 'playlistDetail') {
                    song.artist = item.ar ? item.ar[0].name : '未知';
                    song.cover = item.al ? item.al.picUrl : '';
                    song.fee = item.fee || 0; 
                } else if (source === 'newsong') {
                    song.artist = item.song.artists[0].name;
                    song.cover = item.picUrl;
                    song.fee = (item.song && item.song.fee !== undefined) ? item.song.fee : 0; 
                }
                return song;
            });
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return '00:00';
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = Math.floor(seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        playlistToggleBtn.onclick = (e) => {
            e.stopPropagation(); 
            const isShowing = playlistPanel.classList.contains('show');
            if (isShowing) closePlaylistPanel();

                playlistPanel.style.display = 'flex';
                playlistPanel.offsetHeight; 
                playlistPanel.classList.add('show');
                renderPlaylistPanel(); 
                scrollToCurrentSongInPanel(); 
            }
        };

        document.body.addEventListener('click', (e) => {
            if (playlistPanel.classList.contains('show')) {
                if (!playlistPanel.contains(e.target) && e.target !== playlistToggleBtn) {
                    closePlaylistPanel();
                }
            }
        });

            playlistPanel.classList.remove('show');
            setTimeout(() => { if(!playlistPanel.classList.contains('show')) playlistPanel.style.display = 'none'; }, 300);

        clearPlaylistBtn.onclick = () => {
            playingList = [];
            currentPlayingIndex = -1;

            audioPlayer.pause();
            audioPlayer.src = ''; 
            playPauseBtn.innerHTML = ICON_PLAY_LARGE;
            playPauseBtn.classList.remove('is-paused');
            
            document.getElementById('currentSongName').innerText = 'MusicZ';
            document.getElementById('currentArtist').innerText = '听你想听';
            document.getElementById('albumCover').src = 'https://s1.music.126.net/style/web2/img/default/default_album.jpg';
            document.getElementById('lyricList').innerHTML = '<li>欢迎使用MusicZ</li>';
            
            parsedLyrics = [];
            document.getElementById('lyricList').style.transform = `translateY(0px)`;

            updateProgressUI(); 
            currentTimeText.innerText = '00:00';

        function renderPlaylistPanel() {
            playlistPanelList.innerHTML = '';

            if (isBlindBoxMode) {
                playlistCountBadge.innerText = '∞';
                panelHeaderCount.innerText = '∞';
                
                if (currentPlayingIndex !== -1 && playingList[currentPlayingIndex]) {
                    const song = playingList[currentPlayingIndex];
                    const isAudioPlaying = !audioPlayer.paused;
                    const prefixIcon = isAudioPlaying ? ICON_PAUSE_SMALL : ICON_PLAY_SMALL;
                    const li = document.createElement('li');
                    li.classList.add('active');
                    li.innerHTML = `
                        <span class="panel-song-name">${prefixIcon}${song.name}</span>
                        <span class="panel-song-artist">${song.artist}</span>
                    `;
                    li.onclick = () => {
                        if (audioPlayer.paused) audioPlayer.play();
                        else audioPlayer.pause();
                    };
                    playlistPanelList.appendChild(li);
                }

                const mysteryLi = document.createElement('li');
                mysteryLi.style.justifyContent = 'center';
                mysteryLi.style.color = '#888';
                mysteryLi.style.padding = '30px 0';
                mysteryLi.style.pointerEvents = 'none';
                mysteryLi.style.borderBottom = 'none';
                mysteryLi.style.flexDirection = 'column';
                mysteryLi.style.gap = '10px';
                mysteryLi.innerHTML = `
                    <span style="font-size:24px;">🔮</span>
                    <span>盲盒模式运行中... 下一首是未知的惊喜</span>
                `;
                playlistPanelList.appendChild(mysteryLi);
                return;
            }

            playlistCountBadge.innerText = playingList.length;
            panelHeaderCount.innerText = playingList.length;

            if (playingList.length === 0) {
                playlistPanelList.innerHTML = '<li style="justify-content:center;color:#888;">队列为空</li>';
                return;
            }

            playingList.forEach((song, index) => {
                const li = document.createElement('li');
                const isCurrentSong = index === currentPlayingIndex;
                const isAudioPlaying = isCurrentSong && !audioPlayer.paused;
                
                if (isCurrentSong) li.classList.add('active');
                
                const prefixIcon = isCurrentSong ? (isAudioPlaying ? ICON_PAUSE_SMALL : ICON_PLAY_SMALL) : '';
                const vipTag = song.fee === 1 ? `<span class="vip-tag">VIP</span>` : '';

                    <span class="panel-song-name">${prefixIcon}${song.name}${vipTag}</span>
                    <span class="panel-song-artist">${song.artist}</span>
                `;
                
                li.onclick = () => {
                    if (isCurrentSong) {
                        if (audioPlayer.paused) audioPlayer.play();
                        else audioPlayer.pause();
                    } else playSong(index);
                };
                playlistPanelList.appendChild(li);
            });
        }

            const lis = playlistPanelList.querySelectorAll('li');
            if (lis[currentPlayingIndex]) lis[currentPlayingIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function renderList(title, type, isAppend = false, newData = []) {
            const prevScrollTop = dataList.scrollTop;

                listTitle.innerText = title;
                dataList.innerHTML = '';
                if (displayList.length === 0) {
                    dataList.innerHTML = '<li style="justify-content:center;color:#888;">暂无数据</li>';

                }

                const loader = document.getElementById('loadingMoreIndicator');

            const dataToRender = isAppend ? newData : displayList;

            dataToRender.forEach((item) => {
                const li = document.createElement('li');
                if (item.type === 'song') {
                    const isCurrentSong = playingList.length > 0 && playingList[currentPlayingIndex] && playingList[currentPlayingIndex].id === item.id;
                    const isAudioPlaying = isCurrentSong && !audioPlayer.paused;
                    
                    const icon = isCurrentSong ? (isAudioPlaying ? ICON_PAUSE_SMALL : ICON_PLAY_SMALL) : ICON_PLAY_SMALL;
                    const iconColorStyle = isCurrentSong ? 'color: inherit;' : 'color: #ccc;'; 

                    const vipTag = item.fee === 1 ? `<span class="vip-tag">VIP</span>` : '';

                    li.innerHTML = `
                        <img src="${item.cover}?param=50y50" class="item-cover">
                        <div class="item-info">
                            <span class="item-name">${item.name}${vipTag}</span>
                            <span class="item-sub">${item.artist}</span>
                        </div>
                        <span style="${iconColorStyle} display: flex; align-items: center;">${icon}</span>
                    `;
                    
                    if(isCurrentSong) li.classList.add('playing-now');
                    
                    li.onclick = () => {
                        isBlindBoxMode = false; 
                        
                        playingList = [...displayList].filter(i => i.type === 'song');

                        if (isCurrentSong) {

                    li.innerHTML = `

        function renderBlindBoxUI() {
            listTitle.innerText = '专属音乐盲盒';
            
            if (isBlindBoxMode && playingList.length > 0) {
                dataList.innerHTML = `
                    <div class="blind-box-container">
                        <div class="blind-box-icon icon-playing">🎧</div>

                        <div class="blind-box-desc">不要看歌单，闭上眼睛，享受未知的音乐之旅。<br>遇到不喜欢的，直接使用快捷键或下一首按钮。</div>
                    </div>
                `;

                dataList.innerHTML = `
                    <div class="blind-box-container">

                        <div class="blind-box-title">未知的旋律，一期一会</div>
                        <div class="blind-box-desc">这里没有歌单，只有点击开启后的惊喜。<br>彻底打乱全网热门曲库，每次点击都是全新体验。</div>

                if (blindBoxSourcePool.length < 50) {

        async function fetchBlindBoxDataInBackground() {
            try {
                const randomOffset = Math.floor(Math.random() * 50);
                const playlistsRes = await fetch(`${API_BASE_URL}/top/playlist?limit=5&offset=${randomOffset}`);
                const playlistsData = await playlistsRes.json();
                
                if (playlistsData.playlists && playlistsData.playlists.length > 0) {
                    const randomPlaylist = playlistsData.playlists[Math.floor(Math.random() * playlistsData.playlists.length)];
                    const detailRes = await fetch(`${API_BASE_URL}/playlist/track/all?id=${randomPlaylist.id}&limit=100`);
                    const detailData = await detailRes.json();
                    let poolSongs = formatSongs(detailData.songs, 'playlistDetail');
                    blindBoxSourcePool = [...blindBoxSourcePool, ...poolSongs];
                }

                const newRes = await fetch(`${API_BASE_URL}/personalized/newsong?limit=20`);
                const newData = await newRes.json();
                let newSongs = formatSongs(newData.result, 'newsong');
                blindBoxSourcePool = [...blindBoxSourcePool, ...newSongs];

                const uniquePool = [];
                const idSet = new Set();
                blindBoxSourcePool.forEach(song => {
                    if (!idSet.has(song.id)) {
                        idSet.add(song.id);
                        uniquePool.push(song);
                    }
                });
                blindBoxSourcePool = shuffleArray(uniquePool);
            } catch (e) {
                console.warn("盲盒后台进货失败");
            }
        }

        async function startBlindBoxSession() {
            const btn = document.getElementById('startBlindBoxBtn');
            btn.innerText = '正在调配惊喜...';
            btn.style.pointerEvents = 'none';

            if (blindBoxSourcePool.length < 20) {
                await fetchBlindBoxDataInBackground();
            }

            isBlindBoxMode = true;
            
            const chunk = blindBoxSourcePool.splice(0, 50);
            playingList = chunk;
            
            renderBlindBoxUI();
            playSong(0);
        }

        async function fetchNewSongs(isLoadMore = false) {
            currentView = 'tabNew';
            if (!isLoadMore) {
                pagination.tabNew = { offset: 0, hasMore: true };
                viewDataCache.tabNew = [];
                dataList.innerHTML = '<li style="justify-content:center;">加载中...</li>';
            }
            const limit = isLoadMore ? 10 : 20;
            const offset = pagination.tabNew.offset;
            try {
                const res = await fetch(`${API_BASE_URL}/personalized/newsong?limit=${limit}&offset=${offset}`);
                const data = await res.json();
                const fetchedSongs = formatSongs(data.result, 'newsong');
                const newSongs = fetchedSongs.filter(newSong => !viewDataCache.tabNew.some(cachedSong => cachedSong.id === newSong.id));
                if (newSongs.length === 0) {
                    pagination.tabNew.hasMore = false;
                    renderList('今日最热新歌', 'song', true, []); 
                    return; 
                }
                if (newSongs.length < limit) pagination.tabNew.hasMore = false;
                pagination.tabNew.offset += newSongs.length;
                viewDataCache.tabNew = [...viewDataCache.tabNew, ...newSongs];
                displayList = viewDataCache.tabNew;
                renderList('今日最热新歌', 'song', isLoadMore, newSongs);
            } catch (e) { listTitle.innerText = '加载失败'; }
        }

        async function fetchHotPlaylists(isLoadMore = false) {
            currentView = 'tabPlaylist';
            if (!isLoadMore) {
                pagination.tabPlaylist = { offset: 0, hasMore: true };
                viewDataCache.tabPlaylist = [];
                dataList.innerHTML = '<li style="justify-content:center;">加载中...</li>';

        async function loadMoreData() {
            if (isFetching || currentView === 'tabBlindBox') return; 
            if (pagination[currentView] && !pagination[currentView].hasMore) return;
            isFetching = true;
            const loadingLi = document.createElement('li');
            loadingLi.id = 'loadingMoreIndicator';
            loadingLi.className = 'loading-more';
            loadingLi.innerText = '正在加载更多...';
            dataList.appendChild(loadingLi);
            dataList.scrollTop = dataList.scrollHeight;
            try {
                if (currentView === 'tabNew') await fetchNewSongs(true);
                else if (currentView === 'tabPlaylist') await fetchHotPlaylists(true);
                else if (currentView === 'tabSearch') await fetchSearch(true, lastSearchKeyword);
                else if (currentView === 'playlistDetail') {
                    const cleanName = listTitle.innerText.replace('歌单内容: ', '');
                    await fetchPlaylistDetail(currentPlaylistId, cleanName, true);

        searchInput.addEventListener('input', () => { clearSearch.style.display = searchInput.value.length > 0 ? 'flex' : 'none'; });
        clearSearch.onclick = () => { 
            searchInput.value = ''; 
            clearSearch.style.display = 'none';

                viewDataCache.tabSearch = []; 
                renderSearchEmptyUI();

        async function playSong(index) {
            if (!playingList[index]) return;
            const song = playingList[index];
            currentPlayingIndex = index;

            document.getElementById('currentSongName').innerText = song.name;
            document.getElementById('currentArtist').innerText = song.artist;
            document.getElementById('albumCover').src = song.cover + '?param=300y300';
            fetchLyric(song.id);
            renderPlaylistPanel();

            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: song.name,
                    artist: song.artist,
                    album: isBlindBoxMode ? '专属音乐盲盒' : 'MusicZ',
                    artwork: [
                        { src: song.cover + '?param=300y300', sizes: '300x300', type: 'image/jpeg' }
                    ]
                });
            }

            try {
                const urlRes = await fetch(`${API_BASE_URL}/song/url?id=${song.id}`);
                const urlData = await urlRes.json();
                const audioUrl = urlData.data[0].url;
                if (audioUrl) {
                    audioPlayer.src = audioUrl;
                    audioPlayer.play();
                } else {
                    const reason = song.fee === 1 ? '需VIP或无版权' : '无版权';
                    showCustomAlert(`《${song.name}》${reason}，已自动跳过`);
                    playNextSong(); 
                }
            } catch (e) {}
        }

        async function fetchLyric(songId) {
            const lyricList = document.getElementById('lyricList');
            lyricList.innerHTML = '<li>歌词加载中...</li>';
            lyricList.style.transform = `translateY(0px)`; 
            parsedLyrics = [];
            try {
                const res = await fetch(`${API_BASE_URL}/lyric?id=${songId}`);
                const data = await res.json();
                if (data.lrc && data.lrc.lyric) {
                    const lines = data.lrc.lyric.split('\n');
                    lyricList.innerHTML = ''; 
                    lines.forEach(line => {
                        const match = line.match(/\[(\d{2}):(\d{2})\.(\d{2,3})\](.*)/);
                        if (match) {
                            const time = parseInt(match[1])*60 + parseInt(match[2]) + parseInt(match[3])/(match[3].length===2?100:1000);
                            const text = match[4].trim();
                            if (text) {
                                parsedLyrics.push({ time, text });
                                const li = document.createElement('li');
                                li.innerText = text;
                                lyricList.appendChild(li);
                            }
                        }
                    });
                } else { lyricList.innerHTML = '<li>纯音乐 / 暂无歌词</li>'; }
            } catch (e) { lyricList.innerHTML = '<li>歌词加载失败</li>'; }
        }

        audioPlayer.addEventListener('timeupdate', () => {
            if (parsedLyrics.length === 0) return;
            const currentTime = audioPlayer.currentTime;
            let activeIndex = -1;
            for (let i = 0; i < parsedLyrics.length; i++) {
                if (currentTime >= parsedLyrics[i].time) activeIndex = i;
                else break;
            }
            if (activeIndex !== -1) {
                const lis = document.getElementById('lyricList').querySelectorAll('li');
                lis.forEach(li => li.classList.remove('active'));
                const currentLi = lis[activeIndex];
                if(currentLi) {
                    currentLi.classList.add('active');
                    const boxHalfHeight = document.querySelector('.lyric-box').offsetHeight / 2;
                    const liCenter = currentLi.offsetTop + (currentLi.offsetHeight / 2);
                    let offset = liCenter - boxHalfHeight;
                    if (offset < 0) offset = 0;
                    document.getElementById('lyricList').style.transform = `translateY(-${offset}px)`;
                }
            }
        });

        const PLAY_MODES = ['loop', 'single', 'random'];
        let modeIdx = 0;
        document.getElementById('modeBtn').onclick = function() {
            modeIdx = (modeIdx + 1) % PLAY_MODES.length;
            this.innerText = ['🔁 列表循环', '🔂 单曲循环', '🔀 随机播放'][modeIdx];
        };

        function playNextSong() {
            if (playingList.length === 0) return;
            if (isBlindBoxMode && currentPlayingIndex >= playingList.length - 3) {
                if(blindBoxSourcePool.length < 20) fetchBlindBoxDataInBackground();
                const chunk = blindBoxSourcePool.splice(0, 30);
                playingList = [...playingList, ...chunk];
            }
            let nextIndex = (currentPlayingIndex + 1) % playingList.length;
            if (PLAY_MODES[modeIdx] === 'random' && !isBlindBoxMode) {
                nextIndex = Math.floor(Math.random() * playingList.length);
            }
            playSong(nextIndex);
        }

        function playPrevSong() {
            if (playingList.length === 0) return;
            let prevIndex = currentPlayingIndex - 1;
            if (PLAY_MODES[modeIdx] === 'random' && !isBlindBoxMode) {
                prevIndex = Math.floor(Math.random() * playingList.length);
            } else if (prevIndex < 0) {
                prevIndex = playingList.length - 1;
            }
            playSong(prevIndex);
        }
        
        nextBtn.onclick = playNextSong;
        prevBtn.onclick = playPrevSong;
        audioPlayer.onended = playNextSong;
        
        playPauseBtn.onclick = () => {
            if (playingList.length === 0) {
                showCustomAlert('当前播放列表为空，快去探索一些音乐吧~');
                return;
            }
            if (audioPlayer.paused) audioPlayer.play();
            else audioPlayer.pause();
        };

        function updateProgressUI() {
            let percentage = 0;
            if (progressBar.max > 0) {
                percentage = (progressBar.value / progressBar.max) * 100;
            }
            progressBar.style.setProperty('--progress', `${percentage}%`);
        }

        let isDraggingProgress = false;
        
        audioPlayer.addEventListener('loadedmetadata', () => {
            progressBar.max = audioPlayer.duration;
            durationText.innerText = formatTime(audioPlayer.duration);
        });

        audioPlayer.addEventListener('timeupdate', () => {
            if (!isDraggingProgress) {
                progressBar.value = audioPlayer.currentTime;
                currentTimeText.innerText = formatTime(audioPlayer.currentTime);
                updateProgressUI(); 
            }
        });

        progressBar.addEventListener('mousedown', () => isDraggingProgress = true);
        progressBar.addEventListener('input', () => {
            currentTimeText.innerText = formatTime(progressBar.value);
            updateProgressUI(); 
        });
        progressBar.addEventListener('mouseup', () => {
            isDraggingProgress = false;
            audioPlayer.currentTime = progressBar.value;
        });

        if ('mediaSession' in navigator) {
            navigator.mediaSession.setActionHandler('previoustrack', playPrevSong);
            navigator.mediaSession.setActionHandler('nexttrack', playNextSong);
            navigator.mediaSession.setActionHandler('play', () => audioPlayer.play());
            navigator.mediaSession.setActionHandler('pause', () => audioPlayer.pause());
        }

        document.addEventListener('keydown', (e) => {
            if (e.target.tagName.toLowerCase() === 'input') return;
            switch(e.code) {
                case 'Space':
                    e.preventDefault(); 
                    if (playingList.length === 0) {
                        showCustomAlert('当前播放列表为空，快去探索一些音乐吧~');
                        break;
                    }
                    if (audioPlayer.paused) audioPlayer.play();
                    else audioPlayer.pause();
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    playPrevSong();
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    playNextSong();
                    break;
            }
        });

        audioPlayer.addEventListener('play', () => {
            playPauseBtn.innerHTML = ICON_PAUSE_LARGE;
            playPauseBtn.classList.add('is-paused'); 
            
            if (currentView === 'tabSearch' && viewDataCache.tabSearch.length === 0) {
            } else if (currentView !== 'tabBlindBox') {
                renderList(listTitle.innerText, 'song');
            }
            if (playlistPanel.classList.contains('show')) renderPlaylistPanel();
        });
        
        audioPlayer.addEventListener('pause', () => {
            playPauseBtn.innerHTML = ICON_PLAY_LARGE;
            playPauseBtn.classList.remove('is-paused'); 
            
            if (currentView === 'tabSearch' && viewDataCache.tabSearch.length === 0) {
            } else if (currentView !== 'tabBlindBox') {
                renderList(listTitle.innerText, 'song');
            }
            if (playlistPanel.classList.contains('show')) renderPlaylistPanel();
        });

        window.onload = () => fetchNewSongs();
    </script>
</body>
</html>

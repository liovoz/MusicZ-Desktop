<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>MusicZ 音乐播放器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="player-container" id="playerContainer">
        
        <div id="toastNotification" class="toast-notification"></div>
        <div id="customAlert" class="custom-alert-overlay"><div class="custom-alert-box"><div class="custom-alert-icon">✨</div><div id="customAlertMessage" class="custom-alert-message"></div><button id="customAlertBtn" class="custom-alert-btn">我知道了</button></div></div>
        <div id="customConfirm" class="custom-alert-overlay"><div class="custom-alert-box"><div class="custom-alert-icon">👋</div><div id="customConfirmMessage" class="custom-alert-message"></div><div style="display: flex; gap: 15px; justify-content: center;"><button id="confirmCancelBtn" class="custom-alert-btn secondary">取消</button><button id="confirmOkBtn" class="custom-alert-btn">确认</button></div></div></div>
        
        <div id="loginModal" class="login-modal"><div class="login-card"><span id="closeLogin" class="close-login">✕</span><h3 style="margin-top:0; color:#333;">扫码登录</h3><p style="font-size:12px; color:#888;">请使用网易云音乐 APP 扫码</p><div class="qr-container"><img id="qrImg" class="qr-img" src=""><div id="qrStatusMask" class="qr-status-mask"><span id="qrStatusText"></span><button id="refreshQr" class="custom-alert-btn mini">重新获取</button></div></div></div></div>

        <div id="aboutModal" class="custom-alert-overlay">
            <div class="custom-alert-box about-box">
                <span id="closeAbout" class="close-login">✕</span>
                <div class="about-header">
                    <div class="about-logo-wrapper">
                        <img src="icon.ico" alt="MusicZ Logo" class="about-logo-img">
                    </div>
                    <div class="about-title">MusicZ</div>
                    <div class="about-version">Version 1.8.2</div>
                    <div class="about-slogan">听你想听，探索未知</div>
                    <div class="about-desc">一款极简、纯粹的桌面沉浸式音乐播放器。致力于为你屏蔽一切喧嚣，只留下纯粹的音乐电波。</div>
                </div>
                
                <div id="updateNotesArea" class="update-notes-area">
                    <div class="update-notes-title">✨ 发现新世代：<span id="newVersionTag"></span></div>
                    <div class="update-notes-content" id="updateNotesContent">准备好迎接全新的探索体验。</div>
                </div>

                <div id="updateProgressArea" class="update-progress-area">
                    <div class="update-progress-info">
                        <span id="updateProgressText">正在接收数据：0%</span>
                        <span id="updateSpeedText">0 KB/s</span>
                    </div>
                    <div class="update-progress-bar-bg">
                        <div class="update-progress-bar-fill" id="updateProgressBarFill"></div>
                    </div>
                </div>

                <div class="about-actions" id="aboutActions"></div>
            </div>
        </div>

        <div class="main-content">
            <div class="left-panel">
                <div class="user-profile" id="userProfile">
                    <img id="userAvatar" class="user-avatar" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iI2RkZGRkZCI+PHBhdGggZD0iTTEyIDEyYzIuMjEgMCA0LTEuNzkgNC00cy0xLjc5LTQtNC00LTQgMS43OS00IDQgMS43OSA0IDQgNHptMCAyYy0yLjY3IDAtOCAxLjM0LTggNHYyaDE2di0yYzAtMi42Ni01LjMzLTQtOC00eiIvPjwvc3ZnPg==">
                    <div class="user-info"><div class="user-name-wrapper"><span id="userName" class="user-name">点击登录账号</span><span id="userVipTag" class="vip-tag" style="display:none;">VIP</span></div><span id="userStatus" class="user-status">解锁私人无限电台</span></div>
                </div>
                <img id="albumCover" src="https://s1.music.126.net/style/web2/img/default/default_album.jpg" class="cover-img">
                <div id="currentSongName" class="current-title">MusicZ</div>
                <div id="currentArtist" class="current-artist">听你想听</div>
                <div class="lyric-box"><ul class="lyric-list" id="lyricList"><li>欢迎使用MusicZ</li></ul></div>
                <div id="versionTag" class="version-tag">MusicZ v1.8.2</div>
            </div>

            <div class="right-panel">
                <div class="search-box">
                    <div class="search-input-wrapper"><input type="text" id="searchInput" placeholder="搜索歌曲、歌手、专辑..."><span id="clearSearch">✕</span></div>
                    <button id="searchBtn">搜索</button>
                </div>
                <div class="tab-bar">
                    <button class="tab-btn active" id="tabNew">🎵 推荐新歌</button>
                    <button class="tab-btn" id="tabPlaylist">💽 热门歌单</button>
                    <button class="tab-btn" id="tabBlindBox">🎲 音乐盲盒</button>
                    <button class="tab-btn" id="tabSearch">🔍 探索广场</button>
                </div>
                <div class="list-header" id="listHeaderContainer"><span id="listTitle">今日最热新歌</span><button class="back-btn" id="backBtn">🔙 返回歌单</button></div>
                <ul class="data-list" id="dataList"></ul>
            </div>
        </div>
        
        <div class="bottom-controls">
            <audio id="audioPlayer" autoplay></audio>
            <div class="playback-btns">
                <button id="prevBtn" class="ctrl-btn" title="上一首"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                <button id="playPauseBtn" class="ctrl-btn play-pause-btn" title="播放/暂停"><svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5.14v13.72a1 1 0 001.5.86l11.43-6.86a1 1 0 000-1.72L9.5 4.28a1 1 0 00-1.5.86z"/></svg></button>
                <button id="nextBtn" class="ctrl-btn" title="下一首"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
            </div>
            <div class="progress-container">
                <span class="time-text" id="currentTimeText">00:00</span>
                <div class="progress-bar-wrapper"><input type="range" id="progressBar" min="0" max="0" value="0" step="0.1"></div>
                <span class="time-text" id="durationText">00:00</span>
            </div>
            <div class="right-ctrl-group">
                <button id="modeBtn" class="ctrl-btn mode-ctrl-btn" title="列表循环"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg></button>
                <div class="quality-wrapper">
                    <button id="qualityBtn" class="quality-toggle-btn">标准</button>
                    <div id="qualityPanel" class="quality-panel"><ul class="quality-panel-list" id="qualityList"><li data-level="hires">Hi-Res</li><li data-level="lossless">SQ无损</li><li data-level="exhigh">极高</li><li data-level="standard">标准</li></ul></div>
                </div>
                <button id="playlistToggleBtn" class="playlist-toggle-btn" title="播放列表"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h18c0.55 0 1-0.45 1-1s-0.45-1-1-1H3c-0.55 0-1 0.45-1 1S2.45 13 3 13zm0 7h18c0.55 0 1-0.45 1-1s-0.45-1-1-1H3c-0.55 0-1 0.45-1 1S2.45 20 3 20zM3 6c0 0.55 0.45 1 1 1h18c0.55 0 1-0.45 1-1s-0.45-1-1-1H3C2.45 5 2 5.45 2 6z"/></svg><span id="playlistCountBadge">0</span></button>
            </div>
        </div>

        <div id="playlistPanel" class="playlist-panel">
            <div class="playlist-panel-header"><span>当前播放 (<span id="panelHeaderCount">0</span>)</span><button id="clearPlaylistBtn">🗑️ 清空</button></div>
            <ul class="playlist-panel-list" id="playlistPanelList"></ul>
        </div>
    </div>
    <script src="renderer.js"></script>
</body>
</html>
